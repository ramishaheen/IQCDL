<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="0.45" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="35%" cy="30%" r="80%">
      <stop offset="0" stop-color="#c7d2fe"/>
      <stop offset="0.45" stop-color="#6366f1"/>
      <stop offset="0.85" stop-color="#4338ca"/>
    </radialGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1440" height="860" fill="#05060f"/>
  <rect width="1440" height="860" fill="url(#topGlow)"/>
  <!-- faint grid -->
  <g stroke="#6366f1" stroke-opacity="0.07">
    <g>
      <line x1="0" y1="120" x2="1440" y2="120"/><line x1="0" y1="176" x2="1440" y2="176"/>
      <line x1="0" y1="232" x2="1440" y2="232"/><line x1="0" y1="288" x2="1440" y2="288"/>
      <line x1="0" y1="344" x2="1440" y2="344"/><line x1="0" y1="400" x2="1440" y2="400"/>
    </g>
    <g>
      <line x1="120" y1="90" x2="120" y2="430"/><line x1="288" y1="90" x2="288" y2="430"/>
      <line x1="456" y1="90" x2="456" y2="430"/><line x1="624" y1="90" x2="624" y2="430"/>
      <line x1="792" y1="90" x2="792" y2="430"/><line x1="960" y1="90" x2="960" y2="430"/>
      <line x1="1128" y1="90" x2="1128" y2="430"/><line x1="1296" y1="90" x2="1296" y2="430"/>
    </g>
  </g>

  <!-- navbar -->
  <g transform="translate(96,40)">
    <rect x="0" y="0" width="44" height="44" rx="12" fill="url(#logoG)"/>
    <g transform="translate(22,22)" stroke="#ffffff" stroke-width="1.6" fill="none">
      <circle r="2.6" fill="#ffffff" stroke="none"/>
      <ellipse rx="13" ry="5.2"/>
      <ellipse rx="13" ry="5.2" transform="rotate(60)"/>
      <ellipse rx="13" ry="5.2" transform="rotate(120)"/>
    </g>
    <text x="56" y="29" fill="#ffffff" font-size="20" font-weight="700">IQCDL</text>
  </g>
  <g fill="#cbd5e1" font-size="15" font-weight="500" text-anchor="middle">
    <text x="600" y="68">Program</text>
    <text x="700" y="68">Readiness</text>
    <text x="800" y="68">Roadmap</text>
    <text x="900" y="68">Standards</text>
    <text x="985" y="68">Pricing</text>
  </g>
  <g transform="translate(1130,42)">
    <rect x="0" y="0" width="118" height="40" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="22" cy="20" r="7" fill="none" stroke="#cbd5e1" stroke-width="1.4"/>
    <text x="40" y="25" fill="#e2e8f0" font-size="14">English</text>
    <rect x="130" y="0" width="84" height="40" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.15"/>
    <text x="172" y="25" fill="#f1f5f9" font-size="14" text-anchor="middle">Log in</text>
  </g>

  <!-- hero left -->
  <g transform="translate(96,210)">
    <!-- eyebrow -->
    <rect x="0" y="0" width="430" height="34" rx="17" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="22" cy="17" r="5" fill="#22d3ee"/>
    <text x="38" y="22" fill="#22d3ee" font-size="12.5" font-weight="600" letter-spacing="1.5">ALIGNED WITH NIST · ISO/IEC · IEEE · EU PQC</text>

    <!-- headline -->
    <text x="0" y="118" fill="#ffffff" font-size="68" font-weight="700" letter-spacing="-2">Your license to lead</text>
    <text x="0" y="190" font-size="68" font-weight="700" letter-spacing="-2" fill="url(#headline)">the quantum era</text>

    <!-- subtitle -->
    <text x="0" y="246" fill="#cbd5e1" font-size="18">IQCDL is the international, AI-supported certification that turns</text>
    <text x="0" y="274" fill="#cbd5e1" font-size="18">quantum uncertainty into a measurable plan. Assess your readiness,</text>
    <text x="0" y="302" fill="#cbd5e1" font-size="18">train your people, and migrate to post-quantum security.</text>

    <!-- buttons -->
    <g transform="translate(0,340)">
      <rect x="0" y="0" width="340" height="52" rx="26" fill="url(#btn)"/>
      <text x="170" y="33" fill="#ffffff" font-size="16" font-weight="600" text-anchor="middle">✦  Measure my quantum readiness</text>
      <rect x="360" y="0" width="220" height="52" rx="26" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="470" y="33" fill="#f1f5f9" font-size="16" font-weight="600" text-anchor="middle">Explore the program  →</text>
    </g>

    <text x="0" y="438" fill="#64748b" font-size="12.5" letter-spacing="1.5">TRUSTED BY SECURITY LEADERS, EDUCATORS AND INNOVATORS WORLDWIDE</text>
  </g>

  <!-- qubit orb (right) -->
  <g transform="translate(1130,400)">
    <circle cx="0" cy="0" r="230" fill="url(#orbGlow)"/>
    <g stroke="#ffffff" stroke-opacity="0.16" fill="none">
      <ellipse rx="180" ry="60"/>
      <ellipse rx="180" ry="60" transform="rotate(60)"/>
      <ellipse rx="180" ry="60" transform="rotate(120)"/>
    </g>
    <circle cx="180" cy="0" r="6" fill="#22d3ee"/>
    <circle cx="-90" cy="156" r="6" fill="#d946ef"/>
    <circle cx="-90" cy="-156" r="6" fill="#818cf8"/>
    <circle cx="0" cy="0" r="62" fill="url(#core)"/>
    <circle cx="0" cy="0" r="62" fill="none" stroke="#a5b4fc" stroke-opacity="0.3"/>
    <text x="0" y="-198" fill="#ffffff" fill-opacity="0.7" font-size="18" text-anchor="middle">|0⟩</text>
    <text x="0" y="214" fill="#ffffff" fill-opacity="0.7" font-size="18" text-anchor="middle">|1⟩</text>
  </g>

  <!-- stats strip -->
  <g transform="translate(96,690)">
    <rect x="0" y="0" width="1248" height="120" rx="22" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/>
    <g text-anchor="middle">
      <text x="156" y="58" fill="url(#headline)" font-size="34" font-weight="700">$106B</text>
      <text x="156" y="86" fill="#94a3b8" font-size="13">Quantum market by 2040</text>
      <text x="468" y="58" fill="url(#headline)" font-size="34" font-weight="700">55%</text>
      <text x="468" y="86" fill="#94a3b8" font-size="13">of quantum jobs need a bachelor's or less</text>
      <text x="780" y="58" fill="url(#headline)" font-size="34" font-weight="700">2</text>
      <text x="780" y="86" fill="#94a3b8" font-size="13">Progressive certification levels</text>
      <text x="1092" y="58" fill="url(#headline)" font-size="34" font-weight="700">8+</text>
      <text x="1092" y="86" fill="#94a3b8" font-size="13">International standards aligned</text>
    </g>
    <line x1="312" y1="30" x2="312" y2="90" stroke="#ffffff" stroke-opacity="0.08"/>
    <line x1="624" y1="30" x2="624" y2="90" stroke="#ffffff" stroke-opacity="0.08"/>
    <line x1="936" y1="30" x2="936" y2="90" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <!-- assistant FAB -->
  <g transform="translate(1140,792)">
    <rect x="0" y="0" width="204" height="48" rx="24" fill="url(#btn)"/>
    <text x="102" y="30" fill="#ffffff" font-size="15" font-weight="600" text-anchor="middle">✦  Ask the Quantum Guide</text>
  </g>
</svg>
