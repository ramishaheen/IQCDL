<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 180" role="img" aria-label="IQCDL — International Quantum Computing Driving License">
  <defs>
    <linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a72a0"/>
      <stop offset="0.55" stop-color="#2ba9e0"/>
      <stop offset="1" stop-color="#5ec6f2"/>
    </linearGradient>
  </defs>

  <!-- enclosing rounded rectangle -->
  <rect x="8" y="24" width="398" height="132" rx="26" fill="none" stroke="url(#ig)" stroke-width="5"/>

  <!-- qubit-chip glyph -->
  <g stroke="url(#ig)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="44" y="52" width="76" height="76" rx="16" stroke-width="4.5"/>
    <!-- pins -->
    <line x1="34" y1="68" x2="44" y2="68" stroke-width="3.5"/>
    <line x1="34" y1="90" x2="44" y2="90" stroke-width="3.5"/>
    <line x1="34" y1="112" x2="44" y2="112" stroke-width="3.5"/>
    <line x1="120" y1="68" x2="130" y2="68" stroke-width="3.5"/>
    <line x1="120" y1="90" x2="130" y2="90" stroke-width="3.5"/>
    <line x1="120" y1="112" x2="130" y2="112" stroke-width="3.5"/>
    <line x1="64" y1="42" x2="64" y2="52" stroke-width="3.5"/>
    <line x1="82" y1="42" x2="82" y2="52" stroke-width="3.5"/>
    <line x1="100" y1="42" x2="100" y2="52" stroke-width="3.5"/>
    <line x1="64" y1="128" x2="64" y2="138" stroke-width="3.5"/>
    <line x1="82" y1="128" x2="82" y2="138" stroke-width="3.5"/>
    <line x1="100" y1="128" x2="100" y2="138" stroke-width="3.5"/>
    <!-- Q ring + tail -->
    <circle cx="82" cy="90" r="21" stroke-width="5"/>
    <line x1="95" y1="103" x2="109" y2="117" stroke-width="6"/>
  </g>
  <g fill="url(#ig)">
    <!-- pin nodes -->
    <circle cx="32" cy="68" r="2.6"/><circle cx="32" cy="90" r="2.6"/><circle cx="32" cy="112" r="2.6"/>
    <circle cx="132" cy="68" r="2.6"/><circle cx="132" cy="90" r="2.6"/><circle cx="132" cy="112" r="2.6"/>
    <circle cx="64" cy="40" r="2.6"/><circle cx="82" cy="40" r="2.6"/><circle cx="100" cy="40" r="2.6"/>
    <circle cx="64" cy="140" r="2.6"/><circle cx="82" cy="140" r="2.6"/><circle cx="100" cy="140" r="2.6"/>
    <!-- qubit core + orbit node -->
    <circle cx="82" cy="90" r="5.2"/>
    <circle cx="82" cy="69" r="3.4"/>
    <!-- wordmark -->
    <text x="152" y="120" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="80" font-weight="900" letter-spacing="3">IQCDL</text>
    <!-- tagline (correct spelling) -->
    <g font-family="Arial,'Helvetica Neue',sans-serif" font-weight="700" letter-spacing="2">
      <text x="426" y="71" font-size="26">INTERNATIONAL</text>
      <text x="426" y="105" font-size="26">QUANTUM COMPUTING</text>
      <text x="426" y="139" font-size="26">DRIVING LICENSE</text>
    </g>
  </g>
</svg>
