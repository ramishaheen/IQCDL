<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 190" role="img" aria-label="IQCDL — International Quantum Computing Driving License">
  <g fill="none" stroke="#2ba9e0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- enclosing rounded rectangle around glyph + wordmark -->
    <rect x="10" y="22" width="340" height="146" rx="22" />

    <!-- microchip glyph frame -->
    <rect x="42" y="60" width="72" height="72" rx="14" stroke-width="4" />
    <!-- Q ring + tail -->
    <circle cx="78" cy="96" r="19" stroke-width="5" />
    <line x1="89" y1="107" x2="102" y2="120" stroke-width="5" />
    <!-- chip pins: left -->
    <line x1="32" y1="74" x2="42" y2="74" stroke-width="3.5" />
    <line x1="32" y1="96" x2="42" y2="96" stroke-width="3.5" />
    <line x1="32" y1="118" x2="42" y2="118" stroke-width="3.5" />
    <!-- chip pins: right -->
    <line x1="114" y1="74" x2="124" y2="74" stroke-width="3.5" />
    <line x1="114" y1="96" x2="124" y2="96" stroke-width="3.5" />
    <line x1="114" y1="118" x2="124" y2="118" stroke-width="3.5" />
    <!-- chip pins: top -->
    <line x1="60" y1="50" x2="60" y2="60" stroke-width="3.5" />
    <line x1="78" y1="50" x2="78" y2="60" stroke-width="3.5" />
    <line x1="96" y1="50" x2="96" y2="60" stroke-width="3.5" />
    <!-- chip pins: bottom -->
    <line x1="60" y1="132" x2="60" y2="142" stroke-width="3.5" />
    <line x1="78" y1="132" x2="78" y2="142" stroke-width="3.5" />
    <line x1="96" y1="132" x2="96" y2="142" stroke-width="3.5" />
  </g>
  <g fill="#2ba9e0">
    <!-- chip pin nodes -->
    <circle cx="30" cy="74" r="2.6" /><circle cx="30" cy="96" r="2.6" /><circle cx="30" cy="118" r="2.6" />
    <circle cx="126" cy="74" r="2.6" /><circle cx="126" cy="96" r="2.6" /><circle cx="126" cy="118" r="2.6" />
    <circle cx="60" cy="48" r="2.6" /><circle cx="78" cy="48" r="2.6" /><circle cx="96" cy="48" r="2.6" />
    <circle cx="60" cy="144" r="2.6" /><circle cx="78" cy="144" r="2.6" /><circle cx="96" cy="144" r="2.6" />

    <!-- wordmark -->
    <text x="150" y="120" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="900" letter-spacing="2">IQCDL</text>

    <!-- tagline (corrected spelling) -->
    <g font-family="Arial, 'Helvetica Neue', sans-serif" font-weight="700" letter-spacing="1.5">
      <text x="372" y="72" font-size="27">INTERNATIONAL</text>
      <text x="372" y="106" font-size="27">QUANTUM COMPUTING</text>
      <text x="372" y="140" font-size="27">DRIVING LICENSE</text>
    </g>
  </g>
</svg>
