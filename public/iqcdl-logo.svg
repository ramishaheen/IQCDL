<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 180" role="img" aria-label="IQCDL — International Quantum Computing Driving License">
  <defs>
    <linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a72a0"/>
      <stop offset="0.55" stop-color="#2ba9e0"/>
      <stop offset="1" stop-color="#5ec6f2"/>
    </linearGradient>
  </defs>

  <!-- enclosing rounded rectangle -->
  <rect x="8" y="24" width="398" height="132" rx="26" fill="none" stroke="url(#ig)" stroke-width="5"/>

  <!-- quantum atom glyph: nucleus + electron orbits, inside a chip frame -->
  <rect x="44" y="52" width="76" height="76" rx="16" fill="none" stroke="url(#ig)" stroke-width="4.5"/>
  <g transform="rotate(0 82 90)">
    <ellipse cx="82" cy="90" rx="29" ry="10.5" fill="none" stroke="url(#ig)" stroke-width="3"/>
    <circle cx="111" cy="90" r="3.3" fill="url(#ig)"/>
  </g>
  <g transform="rotate(60 82 90)">
    <ellipse cx="82" cy="90" rx="29" ry="10.5" fill="none" stroke="url(#ig)" stroke-width="3"/>
    <circle cx="111" cy="90" r="3.3" fill="url(#ig)"/>
  </g>
  <g transform="rotate(120 82 90)">
    <ellipse cx="82" cy="90" rx="29" ry="10.5" fill="none" stroke="url(#ig)" stroke-width="3"/>
    <circle cx="111" cy="90" r="3.3" fill="url(#ig)"/>
  </g>
  <circle cx="82" cy="90" r="6.5" fill="url(#ig)"/>

  <g fill="url(#ig)">
    <!-- wordmark -->
    <text x="152" y="120" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="80" font-weight="900" letter-spacing="3">IQCDL</text>
    <!-- tagline (correct spelling) -->
    <g font-family="Arial,'Helvetica Neue',sans-serif" font-weight="700" letter-spacing="2">
      <text x="426" y="71" font-size="26">INTERNATIONAL</text>
      <text x="426" y="105" font-size="26">QUANTUM COMPUTING</text>
      <text x="426" y="139" font-size="26">DRIVING LICENSE</text>
    </g>
  </g>
</svg>
